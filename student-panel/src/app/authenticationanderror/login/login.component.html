<div class="background show-spinner">
	<div class="fixed-background" style="overflow-y: scroll;">
		<main class="default-transition">
			<div class="container">
				<div class="row h-100">
					<div class="col-12 col-md-10 mx-auto my-auto">
						<div class="card auth-card">
							<div class="position-relative image-side">
								<h4 class="text-white headerSemiBold">LOGIN TO YOUR INSTITUTE</h4>
								<p class="white mb-0 labelTitle">
									Please use your credentials to login.
									<br>If you are not a member, please <a href="#" class="white">register</a>.
								</p>
							</div>
							<div class="form-side">
								<p class="mb-5 text-center d-none">
                                    <img src="../../../assets/img/company.png" class="img-thumbnail list-thumbnail xsmall" alt="Logo">
                                </p>
								
								<p class="alert alert-danger labelTitle" role="alert" *ngIf="LoginMessage!=''">{{LoginMessage}}</p>

								<div class="position-relative mb-5">
									<h2 class="headerBold">Login</h2>
								</div>

								<div class="form-group">
									<label class="labelTitle" for="mobileno">Mobile Number</label>
									<input id="mobileno" type="text" class="form-control labelTitle" [(ngModel)]="user.phone" placeholder="Please enter mobile number without country code">
								</div>

								<div class="form-group">
									<label class="labelTitle" for="password">Password</label>
									<input id="password" type="password" class="form-control labelTitle" [(ngModel)]="user.password" (keyup.enter)="onLoggedin()">
								</div>

								<!-- <div class="g-recaptcha" data-sitekey="6LfFjtUUAAAAAGo625k5iEqYbegCR9p7dXDQ7CCI" data-callback="checkCaptch()"></div> -->
								<div #recaptcha ></div>
								<div *ngIf="lastlogin && ((60000*90) > (timeNow-lastlogin))" class="danger">* You have exceeded maximum login, try after {{time}} min</div>

								<div class="d-flex justify-content-between align-items-center">
									<a routerLink="/forgetPassword" class="btn-link headerSemiBold">Forget password? Recover</a>
									<button *ngIf="lastlogin && ((60000*90) > (timeNow-lastlogin))" class="btn btn-secondary default headerSemiBold" type="button" (click)="onLoggedin()" disabled>LOGIN</button>
									<button *ngIf="!lastlogin || ((timeNow-lastlogin) >=(60000*90))" class="btn btn-secondary default headerSemiBold" type="button" (click)="onLoggedin()">LOGIN</button>
								</div>
								<div class="d-flex justify-content-between align-items-center">
									<a routerLink="/register" class="btn-link headerSemiBold">Don't have an Account? Create Account</a>
								</div>
							</div>							
						</div>
					</div>
				</div>
			</div>
		</main>
	</div>
</div>
<div class="noti-back" [ngClass]="notificationMessage ? '':'d-none'">
	<img class="noti-img" src="assets/img/icons/notification.png" alt="notification icon">
</div>

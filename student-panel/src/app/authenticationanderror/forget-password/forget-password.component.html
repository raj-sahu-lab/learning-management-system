<div class="background show-spinner">
    <div class="fixed-background" style="overflow-y: scroll;">
        <main class="default-transition">
            <div class="container">
                <div class="row h-100">
                    <div class="col-12 col-md-10 mx-auto my-auto">
                        <div class="card auth-card">
                            <div class="position-relative image-side">
                                <h4 class="text-white headerSemiBold">Forgot Password</h4>
                                <p class="white mb-0 labelTitle">
                                    Please enter your mobile number to reset your password.
                                </p>
                            </div>
                            <div class="form-side">
                                <p class="mb-5 text-center">
                                    <img src="../../../assets/img/company.png" class="img-thumbnail list-thumbnail xsmall">
                                </p>

                                <p class="alert alert-danger labelTitle" role="alert" *ngIf="LoginMessage!=''">{{LoginMessage}}</p>

                                <div *ngIf="registerMobile == true">
                                    <div class="position-relative mb-5">
                                        <h4 class="headerBold">Forget Password</h4>
                                    </div>

                                    <div class="form-group">
                                        <label class="labelTitle">Mobile Number</label>
                                        <input type="number" class="form-control labelTitle" [(ngModel)]="mobile" placeholder="Please enter mobile number without country code">
                                    </div>

                                    <div class="form-group">
                                        <button class="btn btn-secondary default headerSemiBold float-right" type="button" (click)="sendOTP()">Send OTP</button>
                                    </div>
                                </div>

                                <div *ngIf="registerOTP == true">
                                    
                                    <div class="position-relative mb-5">
                                        <h4 class="headerBold">Verify thats its you?</h4>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label  class="labelTitle">Mobile Number</label>
                                        <input type="number" class="form-control labelTitle" [(ngModel)]="mobile" [readonly]="isReadonly">
                                        <small class="form-text text-muted mt-2 pointer labelTitle" *ngIf="countDownMessage!=0"> {{countDownMessage}} </small>
                                        <small class="form-text text-muted mt-2 pointer labelTitle" *ngIf="countDownMessage==0" (click)="sendOTP()"> Resend OTP </small>
                                    </div>

                                    <div class="form-group">
                                        <label class="labelTitle">Enter OTP <span class="crimson headerSemiBold">(Valid for 2 Min.)</span></label> 
                                        <input type="otp" class="form-control labelTitle" [(ngModel)]="otp">
                                    </div>

                                    <div class="form-group">
                                        <button class="btn btn-secondary default headerSemiBold float-right" type="button" (click)="verifyOTP()">Verify</button>
                                    </div>
                                    
                                </div>

                                <div *ngIf="registerPassword == true">
                                   
                                    <div class="position-relative mb-5">
                                        <h4 class="headerBold">Great, Now create a Password</h4>
                                    </div>
                                    
                                    <div class="form-group">
                                        <label class="labelTitle">Set Password</label>
                                        <input type="password" class="form-control labelTitle" [(ngModel)]="password">
                                    </div>

                                    <div class="form-group">
                                        <label class="labelTitle">Confirm Password</label>
                                        <input type="password" class="form-control labelTitle" [(ngModel)]="cpassword">
                                    </div>
                                    
                                    <div class="form-group">
                                        <button class="btn btn-secondary default headerSemiBold float-right" type="button" (click)="submitButtonClick()">Done</button>
                                    </div>
                                </div>

                                <!-- <div class="d-flex justify-content-between align-items-center mt-4">
									<a routerLink="/" class="btn-link">Are you already registered? Login now</a>
                                </div> -->
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

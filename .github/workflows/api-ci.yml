name: API CI

on:
  push:
    branches: [ main ]
    paths:
      - 'student-rest-api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'student-rest-api/**'

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    defaults:
      run:
        working-directory: student-rest-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: student-rest-api/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_ENCRYPTION: test_jwt_secret_ci
          DB_HOST: localhost
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: test_db

      - name: Upload coverage
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: student-rest-api/coverage/
          retention-days: 7

name: PHP Lint

on:
  push:
    branches: [ main ]
    paths:
      - 'website/**/*.php'
      - '.github/workflows/php-lint.yml'
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: php-cs-fixer

      - name: Check PHP syntax
        run: |
          find website -name "*.php" -exec php -l {} \; 2>&1 | grep -v "No syntax errors" || true
          echo "PHP lint complete"

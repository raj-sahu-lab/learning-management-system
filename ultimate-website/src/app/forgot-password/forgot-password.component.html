<section id="login-form" class="parallax-bg bg-image page-header bg-no-repeat" data-stellar-background-ratio="0.5"
    data-background="images/content/bg/elements/12.jpg"
    style="background-image: url('http://zozothemes.com/html/epoint/demo/images/content/bg/elements/12.jpg'); background-position: 50% 0%;">
    <div class="container">
        <div class="row">
            <div class="col-sm-6 col-md-offset-3">
                <p class="form-message" style="display: none;"></p>
                <div class="contact-form form-box style1 border-rounded white-bg headerSemiBold">
                    <h3 class="form-box-title theme-bg typo-light text-center">Forgot password</h3>
                    <!--Send Otp Form Begins -->
                    <form *ngIf="registerMobile" class="custom-form bv-form" name="bootstrap-form" id="bootstrap-form"
                        action="sendOtp()" novalidate="novalidate">
                        <button type="submit" class="bv-hidden-submit"
                            style="display: none; width: 0px; height: 0px;"></button>
                        <div class="row" role="form">
                            
                            <div class="form-group">
                                <label>Mobile Number *</label>
                                <input type="text" name="contact_name" class="input-name form-control"
                                    placeholder="Enter Mobile number" data-bv-field="contact_name"><i
                                    class="form-control-feedback" data-bv-icon-for="contact_name"
                                    style="display: none;"></i>
                                <small class="help-block" data-bv-validator="notEmpty" data-bv-for="contact_name"
                                    data-bv-result="NOT_VALIDATED" style="display: none;">Please enter Mobile</small>
                            </div>
                        </div>
                        <button class="btn btn-lg btn-theme btn-block btn-rounded btn-hv-dark btn-hv-dark btn-default"
                            (click)="sendOtp()">Send Otp</button>
                    </form>
                    <!-- Verify otp -->
                    <form *ngIf="registerOTP" class="custom-form bv-form" name="bootstrap-form" id="bootstrap-form"
                        action="sendOtp()" novalidate="novalidate">
                        <div class="input-text form-group has-feedback">
                            <label>Mobile Number *</label>
                            <input type="text" name="contact_name" class="input-name form-control"
                                placeholder="9712316262" data-bv-field="9712316262" [readonly]="true">
                        </div>
                        <div class="input-text form-group has-feedback">
                            <label>Enter Otp*</label>
                            <input type="text" name="otp" class="input-name form-control"
                                placeholder="Enter OTP" data-bv-field="otp"><i
                                class="form-control-feedback" data-bv-icon-for="otp"
                                style="display: none;"></i>
                            <small class="help-block" data-bv-validator="notEmpty" data-bv-for="otp"
                                data-bv-result="NOT_VALIDATED" style="display: none;">Please enter otp</small>
                        </div>
                        <button class="btn btn-lg btn-theme btn-block btn-rounded btn-hv-dark btn-hv-dark btn-default"
                            (click)="verifyOtp()">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
